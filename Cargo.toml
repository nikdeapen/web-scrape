[package]
name = "web-scrape"
version = "0.0.0"
description = "This library aids in scraping data from the web."
readme = "README.md"
repository = "https://github.com/nikdeapen/web-scrape"
homepage = "https://github.com/nikdeapen/web-scrape"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2021"
license = "MIT"

[dependencies]
address = { git = "https://github.com/nikdeapen/address.git" }
enc = { git = "https://github.com/nikdeapen/enc.git", features = ["base-64", "hex"] }
file-storage = { git = "https://github.com/nikdeapen/file-storage.git" }
web-url = { git = "https://github.com/nikdeapen/web-url.git" }

bytes = "1.9.0"
reqwest = { version = "0.12.9", features = ["blocking"] }
scraper = "0.22.0"
