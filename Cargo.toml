[package]
name = "web-scrape"
version = "0.0.0"
description = "This library aids in scraping data from the web."
readme = "README.md"
repository = "https://github.com/nikdeapen/web-scrape"
homepage = "https://github.com/nikdeapen/web-scrape"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2021"
license = "MIT"

[dependencies]
enc = { git = "https://github.com/nikdeapen/enc", features = ["hex", "base-64"] }
file-storage = { git = "https://github.com/nikdeapen/file-storage", features = ["tempfile", "r2"] }
web-url = { git = "https://github.com/nikdeapen/web-url" }

bytes = "1.8.0"
reqwest = { version = "0.12.9", features = ["blocking"] }
scraper = "0.21.0"
