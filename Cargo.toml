[package]
name = "web-scrape"
version = "0.1.0"
description = "This library aids in scraping data from the web."
readme = "README.md"
repository = "https://github.com/nikdeapen/web-scrape"
homepage = "https://github.com/nikdeapen/web-scrape"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2021"
license = "MIT"

[dependencies]
address = "0.12.0"
enc = { version = "0.8.0", features = ["base-64", "hex"] }
file-storage = "0.1.0"
web-url = "0.4.0"

bytes = "1.9.0"
reqwest = { version = "0.12.9", features = ["blocking"] }
scraper = "0.22.0"
