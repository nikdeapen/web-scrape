[package]
name = "web-scrape"
version = "0.1.0"
description = "This library aids in scraping data from the web."
readme = "README.md"
repository = "https://github.com/nikdeapen/web-scrape"
homepage = "https://github.com/nikdeapen/web-scrape"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2021"
license = "MIT"

[dependencies]
clerr = { git = "https://github.com/nikdeapen/clerr" }
enc = { git = "https://github.com/nikdeapen/enc", features = ["base-64", "hex"] }
file-storage = { git = "https://github.com/nikdeapen/file-storage" }
web-url = { git = "https://github.com/nikdeapen/web-url" }

bytes = "1.10.0"
colored = "3.0.0"
reqwest = { version = "0.12.12", features = ["blocking"] }
scraper = "0.22.0"
