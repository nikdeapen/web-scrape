[package]
name = "web-scrape"
version = "0.0.0"
description = "This library aids in scraping data from the web."
readme = "README.md"
repository = "https://github.com/nikdeapen/web-scrape"
homepage = "https://github.com/nikdeapen/web-scrape"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2021"
license = "MIT"

[dependencies]
bytes = "1.10.0"
clerr = { path = "../clerr" }                               # todo -- path dependency
colored = "3.0.0"
enc = { path = "../enc", features = ["base-64", "hex"] }    # todo -- path dependency
file-storage = { path = "../file-storage" }                 # todo -- path dependency
reqwest = { version = "0.12.12", features = ["blocking"] }
scraper = "0.22.0"
web-url = { path = "../web-url" }                           # todo -- path dependency
